<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Videojuegos</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body onload="cargarJuegos()">

<div class="container">

    <nav class="top-nav">
        <a href="./index.html">Juegos</a>
        <a href="./usuarios.html">Usuarios</a>
        <a href="./resenas.html">Reseñas</a>
    </nav>

    <h1>🎮 Gestión de Videojuegos</h1>

    <section class="form-section">
        <h2>Añadir / Actualizar juego</h2>
        <form id="juegoForm">
            <input type="hidden" id="juegoId">

            <div class="form-group">
                <label for="titulo">Título</label>
                <input type="text" id="titulo" required>
            </div>

            <div class="form-group">
                <label for="plataforma">Plataforma</label>
                <input type="text" id="plataforma" required>
            </div>

            <div class="form-group">
                <label for="genero">Género</label>
                <input type="text" id="genero" required>
            </div>

            <div class="buttons">
                <button type="submit">Guardar juego</button>
                <button type="button" onclick="limpiarFormulario()">Limpiar</button>
            </div>
        </form>
    </section>

    <section class="list-section">
        <h2>Lista de juegos</h2>
        <div id="mensaje"></div>
        <div id="juegos" class="juegos-grid"></div>
    </section>

</div>

<script src="./js/app.js"></script>
</body>
</html>
